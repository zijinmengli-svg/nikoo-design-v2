      <div class="ext-label" style="left:7440px;"></div>

  <!-- Footer credit -->

  <!-- 复制成功提示 -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 背景粒子光效（已暂时关闭 · 取消下一行注释即可重新开启） -->
  <!-- <script src="js/bg-particles.js"></script> -->
  <script src="js/scroll.js"></script>
  <!-- 宠胖胖 IP 互动动画（卡片3，悬停挥手）-->
  <script src="js/mascot.js"></script>
  <script src="js/version.js"></script>
  <script>
    /* Card click → project detail (not triggered by P2 thumbnail links) */
    document.querySelectorAll('.card-clickable').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.closest('.wx-copy')) return;        // 联系我按钮自己处理
        var href = card.getAttribute('data-href');
        if (href) window.location.href = href;
      });
    });
  </script>
  <script>
    /* 卡片5「More designs」· 字符逐个翻入（参考 GSAP animate-text 的 characters）
       滚动到该卡片(进入视口)时播放；尊重「减少动态效果」。 */
    (function () {
      var el = document.querySelector('#card-04 .c-big');
      if (!el) return;
      if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var text = el.textContent;
      el.setAttribute('aria-label', text);     /* 拆成单字后用 aria-label 保留可读性 */
      el.textContent = '';
      for (var i = 0; i < text.length; i++) {
        var sp = document.createElement('span');
        sp.className = 'md-char';
        sp.style.setProperty('--i', i);
        if (text.charAt(i) === ' ') { sp.innerHTML = '&nbsp;'; }
        else { sp.textContent = text.charAt(i); }
        el.appendChild(sp);
      }
      el.classList.add('md-split');
      if ('IntersectionObserver' in window) {
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            el.classList.toggle('is-revealing', e.isIntersecting);  /* 进入→播放；离开→移除，再次进入重播 */
          });
        }, { threshold: 0.5 });
        io.observe(el);
      } else {
        el.classList.add('is-revealing');       /* 不支持 IO：直接显示 */
      }
    })();
  </script>
  <script>
    /* 联系卡：点击「联系我」复制微信号 + toast */
    (function () {
      var toast = document.getElementById('toast'), timer = null;
      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('is-visible');
        clearTimeout(timer);
        timer = setTimeout(function () { toast.classList.remove('is-visible'); }, 1800);
      }
      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function(){ showToast('已复制微信号到剪切板'); }, fallback);
        } else { fallback(); }
        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch (e) {}
          document.body.removeChild(ta); showToast('已复制微信号到剪切板');
        }
      }
      document.querySelectorAll('.wx-copy').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.stopPropagation();
          copyText(btn.getAttribute('data-wx') || 'Libin_y');
        });
      });
    })();
  </script>
  <script>
    (function(){
      var warn = document.getElementById('narrowWarn');
      function check(){ warn.style.display = window.innerWidth < 780 ? 'flex' : 'none'; }
      check();
      window.addEventListener('resize', check);
    })();
  </script>
</body>
