<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作品分类</title>
  <link rel="stylesheet" href="css/detail.css">
</head>
<body>
  <main class="detail-shell">
    <div class="detail-wrap" id="app"></div>
  </main>
  <script src="js/site-data.js"></script>
  <script>
    (function () {
      var data = window.NIKOO_SITE_DATA;
      var app = document.getElementById('app');
      var params = new URLSearchParams(window.location.search);
      var key = params.get('cat');
      var category = data && data.categories ? data.categories[key] : null;

      if (!category) {
        app.innerHTML = '<div class="detail-topbar"><div class="detail-nav"><a class="detail-link" href="index.html">首页</a></div></div><section class="detail-frame detail-empty"><div class="detail-kicker">未找到</div><h1 class="detail-title">分类不存在</h1><p class="detail-summary">当前链接对应的分类不存在。</p></section>';
        return;
      }

      document.title = category.title + ' · 作品分类';

      var cardsHtml = category.projects.map(function (projectKey) {
        var project = data.projects[projectKey];
        if (!project) return '';
        return '' +
          '<a class="detail-frame category-item" href="project.html?p=' + projectKey + '">' +
            '<img class="category-item-cover" src="' + project.cover + '" alt="' + project.title + '">' +
            '<div class="category-item-copy">' +
              '<div>' +
                '<div class="detail-kicker">' + project.category + '</div>' +
                '<h2 class="category-item-title">' + project.title + '</h2>' +
                '<p class="category-item-summary">' + project.summary + '</p>' +
              '</div>' +
              '<div class="category-item-link">查看详情</div>' +
            '</div>' +
          '</a>';
      }).join('');

      app.innerHTML =
        '<div class="detail-topbar">' +
          '<div class="detail-nav">' +
            '<a class="detail-link" href="index.html">首页</a>' +
          '</div>' +
        '</div>' +
        '<header class="detail-frame category-header">' +
          '<div class="detail-kicker">分类</div>' +
          '<h1 class="category-title">' + category.title + '</h1>' +
          '<p class="category-subtitle">' + category.subtitle + '</p>' +
        '</header>' +
        '<section class="category-grid">' + cardsHtml + '</section>';
    })();
  </script>
</body>
</html>
