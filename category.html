  <!-- ============================================================
       Renderer + Editor — single unified IIFE
       ============================================================ -->
  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'nikoo-portfolio-v2';

      /* ============ Setup ============ */
      var params = new URLSearchParams(window.location.search);
      var catKey = params.get('cat') || '';
      var cat    = CATEGORIES[catKey];
      var grid   = document.getElementById('catGrid');

      if (!cat) {
        grid.innerHTML =
          '<div class="cat-empty">' +
          '  <div class="cat-empty-icon">🔍</div>' +
          '  <p>分类未找到 — <a href="../nikoo-design-v2/" style="text-decoration:underline">返回首页</a></p>' +
          '</div>';
        return;
      }

      /* ============ Load state ============ */
      var state;
      try {
        var raw0 = localStorage.getItem(STORAGE_KEY);
        state = raw0 ? JSON.parse(raw0) : {};
      } catch (e) { state = {}; }
      if (!state.version) state.version = 2;

      var BAKED_OV   = window.__bakedOverrides    || {};
      var BAKED_META = window.__bakedCategoryMeta || {};

      /* ============ Helpers ============ */
      function pickField(ls, baked, base) {
        if (ls    != null) return ls;
        if (baked != null) return baked;
        return base;
      }
      function isVideoSrc(src) {
        if (!src) return false;
        if (src.indexOf('data:video/') === 0) return true;
        return /\.(mp4|mov|m4v|webm)(\?|$)/i.test(src);
      }
      function buildMedia(src, kind, alt, hoverPlay) {
        if (kind === 'video') {
          var v = document.createElement('video');
          v.src = src;
          v.muted = true; v.loop = true;
          v.autoplay = !hoverPlay;          /* hover-play: don't autoplay; play() on enter */
          v.playsInline = true;
          v.setAttribute('playsinline', '');
          v.preload = hoverPlay ? 'none' : 'auto';   /* 'none' = zero bytes until play() */
          v.addEventListener('contextmenu', function (e) { e.preventDefault(); });
          return v;
        }
        var img = document.createElement('img');
        img.src = src;
        img.alt = alt || '';
        img.loading = 'lazy';
        img.decoding = 'async';
        img.addEventListener('dragstart', function (e) { e.preventDefault(); });
        return img;
      }

      /* ============ Effective per-project overrides (baked ← LS) ============ */
      function computeSaved() {
        var baked = BAKED_OV[catKey] || {};
        var fromLS = (state.categories && state.categories[catKey]) || {};
        var out = {};
        Object.keys(baked).forEach(function (k) { out[k] = Object.assign({}, baked[k]); });
        Object.keys(fromLS).forEach(function (k) {
          if (fromLS[k] && Object.keys(fromLS[k]).length === 0) {
            delete out[k];
          } else {
            out[k] = Object.assign({}, out[k] || {}, fromLS[k]);
          }
        });
        return out;
      }

      /* ============ Short-circuit 1-project category ============ */
      var preliminary = computeSaved();
      var hasNew = Object.keys(preliminary).some(function (k) { return preliminary[k]._new; });
      if (cat.projects.length === 1 && !hasNew &&
          !(preliminary[cat.projects[0].key] && preliminary[cat.projects[0].key].deleted)) {
        window.location.replace('project.html?p=' + cat.projects[0].key);
        return;
      }

      /* Persistence helpers are no-ops in production (no editor wired up). */

      /* ============ Populate header ============ */
      document.title = cat.name + ' — Nikoo Design';
      document.getElementById('docTitle').textContent = document.title;
      document.getElementById('catName').textContent  = cat.name;

      function renderMeta() {
        var lsMeta    = (state.categoriesMeta && state.categoriesMeta[catKey]) || {};
        var bakedMeta = BAKED_META[catKey] || {};
        document.getElementById('catHeading').textContent =
          pickField(lsMeta.heading,     bakedMeta.heading,     cat.heading);
        document.getElementById('catDescription').textContent =
          pickField(lsMeta.description, bakedMeta.description, cat.description);
      }
      renderMeta();

      /* ============ Grid renderer ============ */
      grid.dataset.layout = cat.layout === 'masonry' ? 'masonry' : 'many';
      var bakedKeysMap = {};
      cat.projects.forEach(function (p) { bakedKeysMap[p.key] = true; });

      function renderGrid() {
        grid.innerHTML = '';
        var saved = computeSaved();

        /* 1. Baked entries (minus soft-deleted) */
        var ordered = [];
        cat.projects.forEach(function (p) {
          var s = saved[p.key];
          if (s && s.deleted) return;
          ordered.push({ key: p.key, base: p });
        });
        /* 2. NEW entries (defined in saved with _new, not in baked CATEGORIES) */
        Object.keys(saved).forEach(function (pk) {
          if (bakedKeysMap[pk]) return;
          if (!saved[pk]._new) return;
          if (saved[pk].deleted) return;
          ordered.push({
            key: pk,
            base: {
              key: pk,
              name: saved[pk].name || '未命名项目',
              year: saved[pk].year || '',
              cover: 'images/01-01.png'
            }
          });
        });

        ordered.forEach(function (entry) {
          grid.appendChild(buildCard(entry.key, entry.base, saved));
        });

        /* Empty state if no visible projects */
        if (ordered.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'cat-empty';
          empty.innerHTML = '<div class="cat-empty-icon">🚧</div><p>作品准备中 · 敬请期待</p>';
          grid.appendChild(empty);
        }

        /* True Pinterest masonry — JS-driven shortest-column-first packing. */
        if (cat.layout === 'masonry') {
          whenImagesLoaded(grid, layoutMasonry);
        }
      }

      /* ============ True masonry layout (shortest-col-first packing) ============
         Items absolutely positioned; each new item goes to the column with the
         currently-lowest bottom edge. Eliminates row-baseline alignment and
         removes whitespace caused by column-fill: balance. */
      function layoutMasonry() {
        if (grid.dataset.layout !== 'masonry') return;
        var gap = 24;
        /* Column count — match the CSS responsive breakpoints */
        var vw = window.innerWidth;
        var cols = vw <= 600 ? 1 : (vw <= 1024 ? 2 : 3);
        var containerW = grid.clientWidth;
        var colW = (containerW - gap * (cols - 1)) / cols;
        var colH = [];
        for (var i = 0; i < cols; i++) colH.push(0);

        var items = Array.prototype.slice.call(grid.querySelectorAll('.cat-item'));

        /* Width first so the browser can compute final heights. */
        items.forEach(function (el) {
          el.style.width = colW + 'px';
        });
        /* Force reflow so offsetHeight reflects the new width. */
        void grid.offsetHeight;

        items.forEach(function (el) {
          /* Pick shortest column. */
          var minI = 0;
          for (var i = 1; i < cols; i++) if (colH[i] < colH[minI]) minI = i;
          var x = minI * (colW + gap);
          var y = colH[minI];
          el.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
          colH[minI] += el.offsetHeight + gap;
        });

        /* Container height = tallest column (minus the final gap). */
        var maxH = 0;
        for (var j = 0; j < cols; j++) if (colH[j] > maxH) maxH = colH[j];
        grid.style.height = (maxH > gap ? maxH - gap : 0) + 'px';
      }

      /* Wait until every <img> inside `root` has loaded (or errored) before cb. */
      function whenImagesLoaded(root, cb) {
        /* Collect <img> AND <video poster=...> — videos use poster as their
           visible content (with preload=none), so we must wait for the poster
           to load before measuring heights. Otherwise masonry runs at 0 height
           and stacks every card at (0,0). */
        var imgs   = Array.prototype.slice.call(root.querySelectorAll('img'));
        var videos = Array.prototype.slice.call(root.querySelectorAll('video[poster]'));
        var total  = imgs.length + videos.length;
        if (total === 0) { cb(); return; }
        var pending = total;
        var done = function () { if (--pending <= 0) cb(); };

        imgs.forEach(function (img) {
          if (img.complete && img.naturalWidth > 0) done();
          else {
            img.addEventListener('load',  done, { once: true });
            img.addEventListener('error', done, { once: true });
          }
        });

        videos.forEach(function (v) {
          /* Preload poster via a temp Image so we get natural dimensions,
             then lock the video's aspect-ratio so layout has proper height. */
          var probe = new Image();
          probe.onload = function () {
            if (probe.naturalWidth > 0) {
              v.style.aspectRatio = (probe.naturalWidth / probe.naturalHeight).toFixed(4);
            }
            done();
          };
          probe.onerror = done;
          probe.src = v.poster;
        });
      }

      /* Debounced resize handler — re-pack on viewport change. */
      var resizeTimer = null;
      window.addEventListener('resize', function () {
        if (cat.layout !== 'masonry') return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(layoutMasonry, 120);
      });

      function buildCard(pk, p, saved) {
        var isMasonry = cat.layout === 'masonry';      /* hover-play, no click-through */
        var item;
        if (isMasonry) {
          item = document.createElement('div');         /* not a link in masonry mode */
        } else {
          item = document.createElement('a');
          item.href = 'project.html?p=' + pk;
        }
        item.className = 'cat-item';
        item.dataset.projectKey = pk;

        var savedItem = saved[pk] || {};
        var mediaSrc  = savedItem.cover || p.cover;
        var animSrc   = savedItem.animSrc || p.animSrc;

        var cover = document.createElement('div');
        cover.className = 'cat-cover';

        /* MASONRY + animSrc → <video> with poster (default shown) + animation
           src (lazy: preload=none → 0 bytes until first hover play).
           Otherwise → <img> / <video> via buildMedia (regular cover). */
        if (isMasonry && animSrc) {
          cover.classList.add('has-anim');
          var vid = document.createElement('video');
          vid.poster = mediaSrc;            /* static first-frame webp */
          vid.src = animSrc;                /* .webm / .mp4 */
          vid.muted = true;
          vid.loop  = true;
          vid.playsInline = true;
          vid.setAttribute('playsinline', '');
          vid.preload = 'none';             /* 0 bytes until play() */
          vid.addEventListener('contextmenu', function (e) { e.preventDefault(); });
          cover.appendChild(vid);

          item.addEventListener('mouseenter', function () {
            vid.play().catch(function () {});
          });
          item.addEventListener('mouseleave', function () {
            vid.pause();
            try { vid.currentTime = 0; } catch (e) {}
          });
        } else {
          var mediaKind = savedItem.coverKind || (isVideoSrc(mediaSrc) ? 'video' : 'image');
          var mediaEl = buildMedia(mediaSrc, mediaKind, p.name, /* hoverPlay */ false);
          cover.appendChild(mediaEl);
        }
        item.appendChild(cover);

        var meta = document.createElement('div');
        meta.className = 'cat-meta';
        var titleEl = document.createElement('div');
        titleEl.className = 'cat-title';
        titleEl.textContent = savedItem.name || p.name;
        titleEl.dataset.projectKey = pk;
        titleEl.dataset.field = 'name';
        var yearEl = document.createElement('div');
        yearEl.className = 'cat-year';
        yearEl.textContent = savedItem.year || p.year;
        yearEl.dataset.projectKey = pk;
        yearEl.dataset.field = 'year';
        meta.appendChild(titleEl);
        meta.appendChild(yearEl);
        item.appendChild(meta);

        return item;
      }

      renderGrid();

    })();
  </script>
