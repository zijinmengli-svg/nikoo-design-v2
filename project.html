<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 — Nikoo Design</title>
    <link rel="stylesheet" href="css/project.css">
    <meta name="theme-color" content="#080808">
</head>
<body>

    <header class="project-header">
        <a href="index.html" class="project-back" id="projectBack">
            <span class="project-back-arrow">←</span> 返回
        </a>
        <div class="project-header-info">
            <span class="project-header-name"  id="projectName"  data-field="name"></span>
            <span class="project-header-year"  id="projectYear"  data-field="year"></span>
        </div>
    </header>

    <main class="project-main" id="projectMain">
        <div class="project-intro" id="projectIntro">
            <p class="project-description" id="projectDescription" data-field="description"></p>
        </div>
        <div class="project-images" id="projectImages"></div>
    </main>

    <script>
        /* Back button — prefer browser history. */
        document.getElementById('projectBack').addEventListener('click', function (e) {
            if (window.history.length > 1 && document.referrer &&
                document.referrer !== window.location.href) {
                e.preventDefault();
                window.history.back();
            }
        });
    </script>

    <!-- ============================================================
         BAKED_PROJECTS — paste exported config here for permanent
         changes that ship with the deployed site & work cross-browser.
         Format: { 'projKey': { name, year, description, images: [{src,kind}] } }
         The "📦 永久保存" button regenerates the snippet to paste here.
         localStorage still overrides this when present.
         ============================================================ -->
    <script>
        /* @baked-start */
        window.__bakedProjects = {};
        /* @baked-end */
    </script>

    <script>
        var PROJECTS = {

            miaosheng: {

                    'images/miaosheng/miaosheng-05.webp','images/miaosheng/miaosheng-06.webp',
                    'images/miaosheng/miaosheng-07.webp','images/miaosheng/miaosheng-08.webp',
                    'images/miaosheng/miaosheng-09.webp','images/miaosheng/miaosheng-10.webp',
                    'images/miaosheng/miaosheng-11.webp','images/miaosheng/miaosheng-12.webp',
                    'images/miaosheng/miaosheng-13.webp','images/miaosheng/miaosheng-14.webp'
                ]
            },

            /* ──────── 卡片 3 · C 端体验设计 ──────── */
            pet: {
                name: '宠胖胖',
                year: '2022–2024',
                images: [
                    'images/pet/A1-01.webp','images/pet/A1-02.webp','images/pet/A1-03.webp',
                    'images/pet/A1-04.webp','images/pet/A1-05.webp','images/pet/A1-06.webp',
                    'images/pet/A1-07.webp','images/pet/A1-08.webp','images/pet/A1-088.webp',
                    'images/pet/A1-09.webp','images/pet/A1-10.webp','images/pet/A1-11.webp',
                    'images/pet/A1-12.webp','images/pet/A1-13.webp','images/pet/A1-14.webp',
                    'images/pet/A1-15.webp','images/pet/A1-16.webp','images/pet/A1-17.webp',
                    'images/pet/A1-18.webp','images/pet/A1-19.webp'
                ]
            },
            flashparty: {
                name: '闪聚',
                year: '2020–2021',
                images: [
                    'images/flashparty/A2-01.webp','images/flashparty/A2-02.webp','images/flashparty/A2-03.webp',
                    'images/flashparty/A2-04.webp','images/flashparty/A2-05.webp','images/flashparty/A2-06.webp',
                    'images/flashparty/A2-07.webp','images/flashparty/A2-08.webp','images/flashparty/A2-09.webp',
                    'images/flashparty/A2-10.webp','images/flashparty/A2-11.webp','images/flashparty/A2-12.webp',
                    'images/flashparty/A2-13.webp','images/flashparty/A2-14.webp','images/flashparty/A2-15.webp',
                    'images/flashparty/A2-16.webp','images/flashparty/A2-17.webp','images/flashparty/A2-18.webp'
                ]
            },
            blockpixel: {
                name: 'Block Pixel Puzzle',
                year: '2020',
                images: [
                    'images/blockpixel/06-01.webp','images/blockpixel/06-02.webp',
                    'images/blockpixel/06-03.webp','images/blockpixel/06-04.webp',

                ]
            },

            /* ──────── 卡片 4 · B 端体验设计 ──────── */
            crm: {

                images: [
                    'images/crm/07-01.webp',

                ]
            },
            capybara: {

                    'images/capybara/08-01.webp',

                ]
            },
            kejiji: {
                name: '客集集直播',
                year: '2019',
                images: [
                    'images/kejiji/05-01.webp','images/kejiji/05-02.webp',
                    'images/kejiji/05-03.webp','images/kejiji/05-04.webp',
                    'images/kejiji/05-05.webp','images/kejiji/05-06.webp'
                ]
            },
            otherui: {
                name: '其他 UI 设计',
                year: '2018–2020',
                images: [
                    'images/otherui/08-04.webp',
                    'images/otherui/A6-1-motorcycle.webp',

                ]
            },

            /* ──────── 卡片 5 · 视觉设计（4 个项目）──────── */
            'visual-01': {
                name: '视觉作品 01',
                year: '2023',
                images: ['images/visual/09-01.webp']
            },
            'visual-02': {
                name: '视觉作品 02',
                year: '2022',
                images: [
                    'images/visual/09-02.webp',
                    'images/visual/09-03.webp',
                    'images/visual/09-04.webp'
                ]
            },
            'visual-03': {
                name: '视觉作品 03',
                year: '2020',
                images: [
                    'images/visual/A6-6.webp',
                    'images/visual/B2-1.webp',
                    'images/visual/D1-4.webp'
                ]
            },
            'visual-04': {
                name: '视觉作品 04',
                year: '2018',
                images: ['images/visual/D1-7.webp']
            },

            /* ──────── 卡片 6 · 动效设计（占位）──────── */
            'motion-01': { name: 'UI 动效集',     year: '2024', images: ['images/01-02.png'], placeholder: true },
            'motion-02': { name: 'Logo 动画',     year: '2023', images: ['images/01-01.png'], placeholder: true },
            'motion-03': { name: '交互原型',      year: '2023', images: ['images/01-02.png'], placeholder: true },
            'motion-04': { name: '微交互探索',    year: '2022', images: ['images/01-01.png'], placeholder: true }
        };

        (function () {
            'use strict';

            var STORAGE_KEY = 'nikoo-portfolio-v2';
            var params = new URLSearchParams(window.location.search);
            var key    = params.get('p') || '';

            /* ============ Load global state ============ */
            var state;
            try {
                var raw = localStorage.getItem(STORAGE_KEY);
                state = raw ? JSON.parse(raw) : {};
            } catch (e) { state = {}; }
            if (!state.version) state.version = 2;

            var BAKED_PROJECTS = window.__bakedProjects || {};

            /* ============ Element refs ============ */
            var nameEl   = document.getElementById('projectName');
            var yearEl   = document.getElementById('projectYear');
            var descEl   = document.getElementById('projectDescription');
            var imagesEl = document.getElementById('projectImages');
            var mainEl   = document.getElementById('projectMain');

            /* Fallback for projects created via category page (state-only) */
            if (!PROJECTS[key]) {
                var synth = null;
                if (state.categories) {
                    Object.keys(state.categories).some(function (ck) {
                        var e = state.categories[ck] && state.categories[ck][key];
                        if (e && e._new) {
                            synth = {
                                name:  e.name || '未命名项目',
                                year:  e.year || '',
                                images: e.cover ? [{ src: e.cover, kind: e.coverKind || 'image' }] : []
                            };
                            return true;
                        }
                        return false;
                    });
                }
                if (synth) {
                    PROJECTS[key] = synth;
                } else {
                    mainEl.innerHTML = [
                        '<div class="project-not-found">',
                        '  <h2>项目未找到</h2>',
                        '  <a href="../nikoo-design-v2/">← 返回首页</a>',
                        '</div>'
                    ].join('');
                    return;
                }
            }

            /* ============ Helpers ============ */
            function normalizeImages(images) {
                return (images || []).map(function (item) {
                    if (typeof item === 'string') return { src: item, kind: 'image' };
                    return Object.assign({}, item);
                });
            }
            function isVideoSrc(src) {
                if (!src) return false;
                if (src.indexOf('data:video/') === 0) return true;
                return /\.(mp4|mov|m4v|webm)(\?|$)/i.test(src);
            }
            function pick(ls, baked, base) {
                if (ls  != null) return ls;
                if (baked != null) return baked;
                return base;
            }

            /* ============ Effective project ============
               Layer order: state.projects ← BAKED_PROJECTS ← PROJECTS
               Plus: category cover overrides only the FIRST image
                     (if state.projects didn't fully override images). */
            function getEffective() {
                var base   = PROJECTS[key];
                var bakedP = BAKED_PROJECTS[key] || {};
                var lsP    = (state.projects && state.projects[key]) || {};

                /* Category-level cover for this project (only set first image) */
                var catCover = null, catKind = null;
                if (state.categories) {
                    Object.keys(state.categories).forEach(function (cat) {
                        var entry = state.categories[cat] && state.categories[cat][key];
                        if (entry && entry.cover) {
                            catCover = entry.cover;
                            catKind  = entry.coverKind || 'image';
                        }
                    });
                }

                var images = normalizeImages(
                    lsP.images   != null ? lsP.images   :
                    bakedP.images != null ? bakedP.images :
                    base.images
                );
                if (catCover && lsP.images == null && bakedP.images == null && images.length > 0) {
                    images = images.slice();
                    images[0] = { src: catCover, kind: catKind };
                }
                return {
                    name:        pick(lsP.name,        bakedP.name,        base.name),
                    year:        pick(lsP.year,        bakedP.year,        base.year),
                    description: pick(lsP.description, bakedP.description, base.description || ''),
                    images:      images
                };
            }

            var project = getEffective();

            /* ============ Renderers ============ */
            function renderText() {
                document.title = project.name + ' — Nikoo Design';
                nameEl.textContent = project.name;
                yearEl.textContent = project.year;
                descEl.textContent = project.description || '';
                descEl.classList.toggle('has-content', !!project.description);
            }
            function renderImages() {
                imagesEl.innerHTML = '';
                project.images.forEach(function (img, idx) {
                    var wrap = document.createElement('div');
                    wrap.className = 'project-image';
                    wrap.dataset.idx = idx;
                    wrap.draggable = true;
                    var el;
                    if (img.kind === 'video') {
                        el = document.createElement('video');
                        el.src = img.src;
                        el.autoplay = true; el.loop = true; el.muted = true;
                        el.playsInline = true;
                        el.setAttribute('playsinline', '');
                        el.addEventListener('contextmenu', function (e) { e.preventDefault(); });
                    } else {
                        el = document.createElement('img');
                        el.src = img.src;
                        el.alt = project.name;
                        el.loading = 'lazy';
                        el.decoding = 'async';
                        el.addEventListener('dragstart', function (e) { e.preventDefault(); });
                    }
                    wrap.appendChild(el);
                    imagesEl.appendChild(wrap);
                });
            }
            renderText();
            renderImages();

            function refresh() {
                project = getEffective();
                renderText();
                renderImages();
            }

        })();
    </script>

</body>
</html>
