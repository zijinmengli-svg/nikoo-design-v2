<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>项目详情</title>
  <link rel="stylesheet" href="css/detail.css">
</head>
<body>
  <main class="detail-shell">
    <div class="detail-wrap" id="app"></div>
  </main>
  <script src="js/site-data.js"></script>
  <script>
    (function () {
      var data = window.NIKOO_SITE_DATA;
      var app = document.getElementById('app');
      var params = new URLSearchParams(window.location.search);
      var key = params.get('p');
      var project = data && data.projects ? data.projects[key] : null;

      if (!project) {
        app.innerHTML = '<div class="detail-topbar"><div class="detail-nav"><a class="detail-link" href="index.html">首页</a></div></div><section class="detail-frame detail-empty"><div class="detail-kicker">未找到</div><h1 class="detail-title">项目不存在</h1><p class="detail-summary">当前链接对应的项目不存在。</p></section>';
        return;
      }

      document.title = project.title + ' · 项目详情';

      var assetsHtml = project.assets.map(function (asset) {
        if (/\.mp4$/i.test(asset)) {
          return '<section class="detail-frame detail-asset"><video src="' + asset + '" controls playsinline preload="metadata"></video></section>';
        }
        return '<section class="detail-frame detail-asset"><img src="' + asset + '" alt="' + project.title + '"></section>';
      }).join('');

      app.innerHTML =
        '<div class="detail-topbar">' +
          '<div class="detail-nav">' +
            '<a class="detail-link" href="javascript:history.back()">返回</a>' +
            '<a class="detail-link" href="index.html">首页</a>' +
          '</div>' +
        '</div>' +
        '<section class="detail-frame detail-hero">' +
          '<div><img class="detail-cover" src="' + project.cover + '" alt="' + project.title + '"></div>' +
          '<div class="detail-copy">' +
            '<div>' +
              '<div class="detail-kicker">' + project.category + '</div>' +
              '<h1 class="detail-title">' + project.title + '</h1>' +
              '<p class="detail-summary">' + project.summary + '</p>' +
            '</div>' +
            '<div class="detail-meta">项目内容 · 共 ' + project.assets.length + ' 个媒体素材</div>' +
          '</div>' +
        '</section>' +
        '<section class="detail-grid">' + assetsHtml + '</section>';
    })();
  </script>
</body>
</html>
